server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ems_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

cache:
  redis-enabled: ${CACHE_REDIS_ENABLED:true}
  dictionary-ttl: 600
  statistics-ttl: 300

jwt:
  secret: ${JWT_SECRET:employee-management-system-secret-key-2024-change-me-in-production}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

encryption:
  key: ${ENCRYPTION_KEY:ems_256bit_aes_key_2024_prod_v11}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.ems: debug
    com.ems.mapper: debug

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always
